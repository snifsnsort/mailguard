version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - SECRET_KEY=dev-secret-change-me
      - ENCRYPTION_KEY=          # leave blank for dev (auto-generated per-process)
      - DATABASE_URL=sqlite:///./mailguard.db
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:8000
    volumes:
      - ./data:/app/backend/mailguard.db   # persist SQLite across restarts
    restart: unless-stopped

  # Optional: swap SQLite for Postgres in production
  # db:

name: Build & Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME:       ${{ vars.ACR_NAME }}
  CONTAINER_APP:  ${{ vars.CONTAINER_APP }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
  IMAGE:          ${{ vars.ACR_NAME }}.azurecr.io/mailguard

jobs:
  # ── Job 1: Test ───────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL:   sqlite:///./test.db
          SECRET_KEY:     test-secret-key-not-for-production
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzbG9uZw==
          ALLOWED_ORIGINS: "*"
          DEBUG: "true"
        run: PYTHONPATH=. pytest tests/ -v --tb=short

  # ── Job 2: Build & Push ────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Summary
        run: |
          echo "### 🐳 Image pushed" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.meta.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY

  # ── Job 3: Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.health.outputs.app_url }}

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy new image
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE }}:${{ needs.build.outputs.image_tag }} \
            --output none

      - name: Health check
        id: health
        run: |
          APP_URL="https://$(az containerapp show \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' -o tsv)"
          echo "app_url=${APP_URL}" >> $GITHUB_OUTPUT

          echo "Waiting 30s for container to start..."
          sleep 30

          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/api/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i — HTTP $STATUS — retrying in 15s..."
            sleep 15
          done
          echo "❌ Health check failed"
          exit 1

      - name: Summary
        run: |
          echo "### 🚀 Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.health.outputs.app_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE }}:${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY

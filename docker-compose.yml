version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - DEBUG=true
      - SECRET_KEY=dev-secret-change-me
      - DATABASE_URL=sqlite:////tmp/mailguard.db
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:8000
    volumes:
      - mailguard_data:/tmp
    restart: unless-stopped

volumes:
  mailguard_data:
